version: '3.8'

services:
  # PostgreSQL数据库 (使用TimescaleDB)
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: okk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: okk_quant
      POSTGRES_USER: okk_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_complete.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "54321:5432"  # 外部端口改为54321，避免与主机现有PG冲突
    networks:
      - okk_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okk_user -d okk_quant"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: okk_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "63791:6379"  # 外部端口改为63791，避免与主机现有Redis冲突
    networks:
      - okk_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: okk_backend
    restart: unless-stopped
    env_file:
      - .env  # 加载所有环境变量
    environment:
      # 这里只保留需要动态组合或覆盖的变量
      - DATABASE_URL=postgresql+psycopg://okk_user:${POSTGRES_PASSWORD}@postgres:5432/okk_quant
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CORS_ORIGINS=["https://${DOMAIN}", "https://www.${DOMAIN}"]
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - okk_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: okk_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - okk_network
    depends_on:
      - backend

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: okk_nginx
    restart: unless-stopped
    ports:
      - "8088:80"  # 更改为8088端口，避免与1Panel冲突，由1Panel进行反向代理
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
    networks:
      - okk_network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  okk_network:
    driver: bridge