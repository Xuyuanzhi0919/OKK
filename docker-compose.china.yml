version: '3.8'

services:
  # PostgreSQL数据库 (使用阿里云镜像)
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/timescale/timescaledb:latest-pg15
    container_name: okk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: okk_quant
      POSTGRES_USER: okk_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_complete.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - okk_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okk_user -d okk_quant"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存 (使用阿里云镜像)
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:7-alpine
    container_name: okk_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - okk_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: okk_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+psycopg://okk_user:${POSTGRES_PASSWORD}@postgres:5432/okk_quant
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_SECRET_KEY=${OKX_SECRET_KEY}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE}
      - OKX_SIMULATED=${OKX_SIMULATED:-true}
      - CORS_ORIGINS=["https://${DOMAIN}", "https://www.${DOMAIN}"]
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    networks:
      - okk_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: okk_frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=https://${DOMAIN}/api
    ports:
      - "3000:80"
    networks:
      - okk_network
    depends_on:
      - backend

  # Nginx反向代理 (使用阿里云镜像)
  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/library/nginx:alpine
    container_name: okk_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    networks:
      - okk_network
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  okk_network:
    driver: bridge